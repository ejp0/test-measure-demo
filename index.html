<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Projection Comparison Tool</title>

  <!-- ✅ Leaflet (CORRECT) -->
  <link rel="stylesheet" href="t/leaflet.css
  https://unpkg.com/leaflet/dist/leaflet.js</script>

  <!-- ✅ Turf -->
  <script src="https://unpkg.com/@turf/turf/turf.min.js"></script>

  <!-- ✅ Proj4 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>

  <style>
    body { margin:0; font-family: Arial; }
    #map { width: 65%; height: 100vh; float: left; }
    #panel { width: 35%; height: 100vh; float: right; padding:10px; }
    button { display:block; margin-bottom:6px; }
  </style>
</head>

<body>

<div id="map"></div>

<div id="panel">
  <h3>Projection Tool</h3>

  <button onclick="startLine()">Draw Line</button>
  <button onclick="startPolygon()">Draw Polygon</button>
  <button onclick="startPoint()">Get Coordinates</button>
  <button onclick="undoPoint()">Undo Last Point</button>
  <button onclick="finishDrawing()">Finish Drawing</button>
</div>

<script>

// ✅ Confirm scripts loaded
console.log("Leaflet loaded:", typeof L);
console.log("Turf loaded:", typeof turf);
console.log("Proj4 loaded:", typeof proj4);

// --- Map
const map = L.map('map').setView([37,-120], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// --- State
let drawing = false;
let mode = null;
let points = [];
let drawnShape = null;
let vertexMarkers = [];

// --- Tool selectors
function startLine(){ mode="line"; reset(); }
function startPolygon(){ mode="polygon"; reset(); }
function startPoint(){ mode="point"; reset(); }

// --- Reset
function reset(){
  drawing = true;
  points = [];

  if(drawnShape) map.removeLayer(drawnShape);
  vertexMarkers.forEach(m=>map.removeLayer(m));
  vertexMarkers = [];

  map.getContainer().style.cursor="crosshair";
}

// --- Finish
function finishDrawing(){
  drawing=false;
  map.getContainer().style.cursor="";
}

// --- Undo
function undoPoint(){
  if(points.length===0) return;

  points.pop();
  const m = vertexMarkers.pop();
  if(m) map.removeLayer(m);

  redraw();
}

// --- Click handler
map.on('click', function(e){

  if(!drawing) return;

  const lng = e.latlng.lng;
  const lat = e.latlng.lat;

  if(mode==="point"){
    points=[[lng,lat]];

    if(drawnShape) map.removeLayer(drawnShape);

    drawnShape = L.circleMarker([lat,lng],{radius:6,color:"green"}).addTo(map);
    return;
  }

  points.push([lng,lat]);

  const marker = L.circleMarker([lat,lng],{
    radius:4,color:"black",fillOpacity:1
  }).addTo(map);

  vertexMarkers.push(marker);

  redraw();

});

// --- Draw geometry
function redraw(){

  if(drawnShape) map.removeLayer(drawnShape);

  if(mode==="line"){
    drawnShape = L.polyline(points.map(p=>[p[1],p[0]]),{color:"red"}).addTo(map);
  }

  if(mode==="polygon"){

    let pts=[...points];

    if(points.length>=3){
      pts=[...points,points[0]];
    }

    drawnShape = L.polygon(pts.map(p=>[p[1],p[0]]),
      {color:"blue",fillOpacity:0.3}).addTo(map);
  }
}

</script>

</body>
</html>
