<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Projection Comparison Tool</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Turf -->
  <script src="https://unpkg.com/@turf/turf/turf.min.js"></script>

  <!-- Proj4 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>

  <style>
    body { margin: 0; font-family: Arial; }
    #map { width: 65%; height: 100vh; float: left; }
    #panel { width: 35%; height: 100vh; float: right; padding: 10px; overflow: auto; }
    h3 { margin-top: 0; }
    .result { margin-bottom: 15px; }
  </style>
</head>

<body>

<div id="map"></div>

<div id="panel">
  <h3>Projection Comparison</h3>

  <p style="font-size: 12px; color: #555;">
    <b>How to use:</b><br>
    • Draw Line → compare distances<br>
    • Draw Polygon → compare areas<br>
    • Get Coordinates → compare coordinate systems<br><br>
    Measurements vary because projections optimize different properties.
  </p>

  <button onclick="startLine()">Draw Line</button>
  <button onclick="startPolygon()">Draw Polygon</button>
  <button onclick="startPoint()">Get Coordinates</button>
  <button onclick="finishDrawing()">Finish Drawing</button>
  <button onclick="runAnalysis()">Run Analysis</button>

  <div id="results"></div>
</div>

<script>

// --- Map setup
const map = L.map('map').setView([37, -120], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
  .addTo(map);

// --- State
let drawing = false;
let mode = null;
let points = [];
let drawnShape = null;

// --- Controls
function startLine() {
  mode = "line";
  resetDrawing();
}

function startPolygon() {
  mode = "polygon";
  resetDrawing();
}

function startPoint() {
  mode = "point";
  resetDrawing();
}

function resetDrawing() {
  drawing = true;
  points = [];

  if (drawnShape) map.removeLayer(drawnShape);

  map.getContainer().style.cursor = "crosshair";
}

function finishDrawing() {
  drawing = false;
  map.getContainer().style.cursor = "";
}

// --- Click handler
map.on('click', function(e) {

  if (!drawing) return;

  const lng = e.latlng.lng;
  const lat = e.latlng.lat;

  // --- POINT MODE
  if (mode === "point") {

    points = [[lng, lat]];

    if (drawnShape) map.removeLayer(drawnShape);

    drawnShape = L.circleMarker([lat, lng], {
      radius: 6,
      color: "green",
      fillOpacity: 1
    }).addTo(map);

    return;
  }

  points.push([lng, lat]);

  // vertex marker
  L.circleMarker([lat, lng], {
    radius: 4,
    color: "black",
    fillColor: "white",
    fillOpacity: 1
  }).addTo(map);

  if (drawnShape) map.removeLayer(drawnShape);

  // --- LINE
  if (mode === "line") {
    drawnShape = L.polyline(points.map(p => [p[1], p[0]]), {
      color: "red",
      weight: 3
    }).addTo(map);
  }

  // --- POLYGON
  if (mode === "polygon") {

    let displayPoints = [...points];

    if (points.length >= 3) {
      displayPoints = [...points, points[0]];
    }

    drawnShape = L.polygon(displayPoints.map(p => [p[1], p[0]]), {
      color: "blue",
      fillOpacity: 0.3
    }).addTo(map);
  }

});

// --- Projections
const wgs84 = "EPSG:4326";

proj4.defs("EPSG:26910",
  "+proj=utm +zone=10 +datum=NAD83 +units=m +no_defs"
);

proj4.defs("EPSG:3310",
  "+proj=aea +lat_1=34 +lat_2=40.5 +lat_0=0 +lon_0=-120 " +
  "+x_0=0 +y_0=-4000000 +datum=NAD83 +units=m +no_defs"
);

proj4.defs("CA_LCC",
  "+proj=lcc +lat_1=34 +lat_2=40.5 +lat_0=36 +lon_0=-120 " +
  "+x_0=0 +y_0=0 +datum=NAD83 +units=m +no_defs"
);

// --- State Plane selector
function getStatePlaneZone(lat) {
  if (lat > 40) return { name: "Zone 1", cm: -122 };
  if (lat > 37.5) return { name: "Zone 2", cm: -122 };
  if (lat > 35.5) return { name: "Zone 3", cm: -120.5 };
  if (lat > 34) return { name: "Zone 4", cm: -119 };
  if (lat > 33) return { name: "Zone 5", cm: -118 };
  return { name: "Zone 6", cm: -117 };
}

// --- Helpers
function projectCoords(coords, from, to) {
  return coords.map(c => proj4(from, to, c));
}

function reprojectGeom(geom, proj) {
  const coords = geom.geometry.coordinates;

  if (geom.geometry.type === "LineString") {
    return turf.lineString(projectCoords(coords, wgs84, proj));
  }

  if (geom.geometry.type === "Polygon") {
    return turf.polygon([
      projectCoords(coords[0], wgs84, proj)
    ]);
  }
}

function calcError(val, base) {
  return ((val - base) / base) * 100;
}

// --- Analysis
function runAnalysis() {

  if (points.length < 1) {
    alert("Create something first.");
    return;
  }

  // --- POINT MODE
  if (mode === "point") {

    const [lon, lat] = points[0];

    const utm = proj4("EPSG:4326", "EPSG:26910", [lon, lat]);
    const alb = proj4("EPSG:4326", "EPSG:3310", [lon, lat]);
    const merc = proj4("EPSG:4326", "EPSG:3857", [lon, lat]);
    const ca = proj4("EPSG:4326", "CA_LCC", [lon, lat]);

    document.getElementById("results").innerHTML = `
      <div class="result">
        <b>Coordinate Comparison</b><br><br>

        ✅ WGS84:<br>
        ${lat.toFixed(6)}, ${lon.toFixed(6)}<br><br>

        UTM:<br>
        ${utm[0].toFixed(2)}, ${utm[1].toFixed(2)}<br><br>

        Albers:<br>
        ${alb[0].toFixed(2)}, ${alb[1].toFixed(2)}<br><br>

        CA LCC:<br>
        ${ca[0].toFixed(2)}, ${ca[1].toFixed(2)}<br><br>

        Web Mercator:<br>
        ${merc[0].toFixed(2)}, ${merc[1].toFixed(2)}
      </div>
    `;

    return;
  }

  // --- GEOMETRY
  let geometry;

  if (mode === "line") {
    geometry = turf.lineString(points);
  }

  if (mode === "polygon") {
    geometry = turf.polygon([[...points, points[0]]]);
  }

  const centroid = turf.centroid(geometry);
  const lat = centroid.geometry.coordinates[1];
  const spZone = getStatePlaneZone(lat);

  const spProj =
    `+proj=lcc +lat_1=34 +lat_2=36.5 +lat_0=33 ` +
    `+lon_0=${spZone.cm} +datum=NAD83 +units=m +no_defs`;

  const gSP = reprojectGeom(geometry, spProj);
  const gUTM = reprojectGeom(geometry, "EPSG:26910");
  const gCA = reprojectGeom(geometry, "CA_LCC");
  const gAlb = reprojectGeom(geometry, "EPSG:3310");
  const gMerc = reprojectGeom(geometry, "EPSG:3857");

  // --- LINE
  if (mode === "line") {

    const base = turf.length(gSP);

    const results = [
      ["State Plane", base],
      ["UTM", turf.length(gUTM)],
      ["Statewide LCC", turf.length(gCA)],
      ["Albers", turf.length(gAlb)],
      ["Web Mercator", turf.length(gMerc)]
    ];

    let html = "<b>Distance (km)</b><br>";

    results.forEach((r, i) => {
      if (i === 0) {
        html += `✅ ${r[0]} (${spZone.name}): ${r[1].toFixed(3)} (baseline)<br>`;
      } else {
        html += `${r[0]}: ${r[1].toFixed(3)} (${calcError(r[1], base).toFixed(2)}%)<br>`;
      }
    });

    document.getElementById("results").innerHTML = html;
  }

  // --- POLYGON
  if (mode === "polygon") {

    const base = turf.area(gAlb) / 1e6;

    const results = [
      ["Albers", base],
      ["State Plane", turf.area(gSP)/1e6],
      ["UTM", turf.area(gUTM)/1e6],
      ["Statewide LCC", turf.area(gCA)/1e6],
      ["Web Mercator", turf.area(gMerc)/1e6]
    ];

    let html = "<b>Area (km²)</b><br>";

    results.forEach((r, i) => {
      if (i === 0) {
        html += `✅ ${r[0]}: ${r[1].toFixed(2)} (baseline)<br>`;
      } else {
        html += `${r[0]}: ${r[1].toFixed(2)} (${calcError(r[1], base).toFixed(2)}%)<br>`;
      }
    });

    document.getElementById("results").innerHTML = html;
  }

}

</script>

</body>
</html>
