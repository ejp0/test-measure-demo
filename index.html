<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Projection Comparison Tool</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Turf -->
  <script src="https://unpkg.com/@turf/turf/turf.min.js"></script>

  <!-- Proj4 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>

  <style>
    body { margin: 0; font-family: Arial; }
    #map { width: 65%; height: 100vh; float: left; }
    #panel { width: 35%; height: 100vh; float: right; padding: 10px; overflow: auto; }
    button { margin-bottom: 5px; display: block; }
  </style>
</head>

<body>

<div id="map"></div>

<div id="panel">
  <h3>Projection Comparison Tool</h3>

  <p style="font-size:12px; color:#555;">
    <b>How to use:</b><br>
    Draw Line → compare distances<br>
    Draw Polygon → compare areas<br>
    Get Coordinates → compare coordinate systems
  </p>

  <button onclick="startLine()">Draw Line</button>
  <button onclick="startPolygon()">Draw Polygon</button>
  <button onclick="startPoint()">Get Coordinates</button>
  <button onclick="undoPoint()">Undo Last Point</button>
  <button onclick="finishDrawing()">Finish Drawing</button>
  <button onclick="runAnalysis()">Run Analysis</button>

  <div id="results"></div>
</div>

<script>

// --- Map
const map = L.map('map').setView([37, -120], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// --- State
let drawing = false;
let mode = null;
let points = [];
let drawnShape = null;
let vertexMarkers = [];

// --- Tools
function startLine() { mode="line"; resetDrawing(); }
function startPolygon() { mode="polygon"; resetDrawing(); }
function startPoint() { mode="point"; resetDrawing(); }

function resetDrawing() {
  drawing = true;
  points = [];

  if (drawnShape) map.removeLayer(drawnShape);

  vertexMarkers.forEach(m => map.removeLayer(m));
  vertexMarkers = [];

  map.getContainer().style.cursor = "crosshair";
}

function finishDrawing() {
  drawing = false;
  map.getContainer().style.cursor = "";
}

function undoPoint() {
  if (!drawing || points.length === 0) return;

  points.pop();

  const m = vertexMarkers.pop();
  if (m) map.removeLayer(m);

  if (drawnShape) map.removeLayer(drawnShape);
  redrawShape();
}

// --- Click draw
map.on('click', function(e) {

  if (!drawing) return;

  const lng = e.latlng.lng;
  const lat = e.latlng.lat;

  // --- POINT MODE
  if (mode === "point") {
    points = [[lng, lat]];

    if (drawnShape) map.removeLayer(drawnShape);

    drawnShape = L.circleMarker([lat,lng], {
      radius:6, color:"green"
    }).addTo(map);

    return;
  }

  points.push([lng, lat]);

  const marker = L.circleMarker([lat,lng], {
    radius:4, color:"black", fillOpacity:1
  }).addTo(map);

  vertexMarkers.push(marker);

  redrawShape();
});

// --- Draw shape
function redrawShape() {

  if (drawnShape) map.removeLayer(drawnShape);

  if (mode === "line") {
    drawnShape = L.polyline(points.map(p=>[p[1],p[0]]), {color:"red"}).addTo(map);
  }

  if (mode === "polygon") {

    let pts = [...points];

    if (points.length >= 3) {
      pts = [...points, points[0]];
    }

    drawnShape = L.polygon(pts.map(p=>[p[1],p[0]]), {
      color:"blue", fillOpacity:0.3
    }).addTo(map);
  }
}

// --- Projections
const wgs84 = "EPSG:4326";

proj4.defs("EPSG:26910", "+proj=utm +zone=10 +datum=NAD83 +units=m +no_defs");

proj4.defs("EPSG:3310",
  "+proj=aea +lat_1=34 +lat_2=40.5 +lon_0=-120 +datum=NAD83 +units=m"
);

proj4.defs("CA_LCC",
  "+proj=lcc +lat_1=34 +lat_2=40.5 +lat_0=36 +lon_0=-120 +datum=NAD83 +units=m"
);

// --- Analysis
function runAnalysis() {

  if (points.length === 0) {
    alert("Draw something first");
    return;
  }

  // --- POINT
  if (mode === "point") {

    const [lon, lat] = points[0];

    const utm = proj4(wgs84, "EPSG:26910", [lon, lat]);
    const alb = proj4(wgs84, "EPSG:3310", [lon, lat]);
    const merc = proj4(wgs84, "EPSG:3857", [lon, lat]);
    const ca = proj4(wgs84, "CA_LCC", [lon, lat]);

    document.getElementById("results").innerHTML = `
      <b>Coordinates</b><br><br>
      WGS84: ${lat.toFixed(6)}, ${lon.toFixed(6)}<br><br>
      UTM: ${utm[0].toFixed(2)}, ${utm[1].toFixed(2)}<br>
      Albers: ${alb[0].toFixed(2)}, ${alb[1].toFixed(2)}<br>
      CA LCC: ${ca[0].toFixed(2)}, ${ca[1].toFixed(2)}<br>
      Mercator: ${merc[0].toFixed(2)}, ${merc[1].toFixed(2)}
    `;
    return;
  }

  let geom;

  if (mode === "line") geom = turf.lineString(points);
  if (mode === "polygon") geom = turf.polygon([[...points, points[0]]]);

  const gAlb = turf.transformRotate(geom, 0); // neutral

  // --- LENGTH
  if (mode === "line") {
    const len = turf.length(geom);
    document.getElementById("results").innerHTML =
      `<b>Distance</b><br>${len.toFixed(3)} km`;
  }

  // --- AREA
  if (mode === "polygon") {
    const area = turf.area(geom) / 1e6;
    document.getElementById("results").innerHTML =
      `<b>Area</b><br>${area.toFixed(2)} km²`;
  }
}

</script>

</body>
</html>
