<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Projection Comparison Tool</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Turf -->
  <script src="https://unpkg.com/@turf/turf/turf.min.js"></script>

  <!-- Proj4 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>

  <style>
    body { margin: 0; font-family: Arial; }
    #map { width: 65%; height: 100vh; float: left; }
    #panel { width: 35%; height: 100vh; float: right; padding: 10px; overflow: auto; }
    h3 { margin-top: 0; }
    button { margin-bottom: 5px; }
  </style>
</head>

<body>

<div id="map"></div>

<div id="panel">
  <h3>Projection Comparison</h3>

  <p style="font-size: 12px; color: #555;">
    <b>How to use:</b><br>
    • Line: click points → Finish Drawing<br>
    • Polygon: click 3+ points → Finish Drawing<br>
    • Point: click once<br><br>
    State Plane = best for distance<br>
    Albers = best for area
  </p>

  <button onclick="startLine()">Draw Line</button>
  <button onclick="startPolygon()">Draw Polygon</button><br>
