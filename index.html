<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Projection Comparison Tool</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Turf -->
  <script src="https://unpkg.com/@turf/turf/turf.min.js"></script>

  <!-- Proj4 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>

  <style>
    body { margin: 0; font-family: Arial; }
    #map { width: 65%; height: 100vh; float: left; }
    #panel { width: 35%; height: 100vh; float: right; padding: 10px; overflow: auto; }
    h3 { margin-top: 0; }
    .result { margin-bottom: 15px; }
  </style>
</head>

<body>

<div id="map"></div>

<div id="panel">
  <h3>Projection Comparison</h3>

  <p style="font-size: 12px; color: #555;">
    Measurements vary because each projection optimizes different properties.<br>
    State Plane is best for local distances. Equal-area (Albers) is best for area.
  </p>

  <button onclick="startLine()">Draw Line</button>
  <button onclick="startPolygon()">Draw Polygon</button>
  <button onclick="finishDrawing()">Finish Drawing</button>
  <button onclick="runAnalysis()">Run Analysis</button>

  <div id="results"></div>
</div>

<script>

// --- Map setup
const map = L.map('map').setView([37, -120], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
  .addTo(map);

// --- Drawing state
let drawing = false;
let mode = null; // "line" or "polygon"
let points = [];
let drawnShape = null;

// --- Drawing controls
function startLine() {
  mode = "line";
  resetDrawing();
}

function startPolygon() {
  mode = "polygon";
  resetDrawing();
}

function resetDrawing() {
  drawing = true;
  points = [];

  if (drawnShape) map.removeLayer(drawnShape);

  map.getContainer().style.cursor = "crosshair";
}

function finishDrawing() {
  drawing = false;
  map.getContainer().style.cursor = "";
}

// --- Click handler
map.on('click', function(e) {

  if (!drawing) return;

  const lng = e.latlng.lng;
  const lat = e.latlng.lat;

  points.push([lng, lat]);

  if (drawnShape) map.removeLayer(drawnShape);

  if (mode === "line") {

      weight: 3
