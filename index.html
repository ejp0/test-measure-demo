<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Projection Comparison Tool</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Turf (geometry ops) -->
  <script src="https://unpkg.com/@turf/turf/turf.min.js"></script>

  <!-- Proj4 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>

  <style>
    body { margin: 0; font-family: Arial; }
    #map { width: 65%; height: 100vh; float: left; }
    #panel { width: 35%; height: 100vh; float: right; padding: 10px; overflow: auto; }
    h3 { margin-top: 0; }
    .result { margin-bottom: 15px; }
  </style>
</head>

<body>

<div id="map"></div>

<div id="panel">
  <h3>Projection Comparison</h3>

  <button onclick="enableDrawing()">Draw Line</button>
  <button onclick="runAnalysis()">Run Analysis</button>

  <div id="results"></div>
</div>

<script>

// --- Map setup
const map = L.map('map').setView([37, -120], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
  .addTo(map);

let drawnLine = null;
let drawing = false;
let points = [];

// --- Enable drawing
function enableDrawing() {
  drawing = true;
  points = [];

  if (drawnLine) map.removeLayer(drawnLine);

  // ✅ Disable map interactions while drawing
  map.dragging.disable();
  map.doubleClickZoom.disable();
  map.scrollWheelZoom.disable();
  map.boxZoom.disable();
  map.keyboard.disable();

  map.getContainer().style.cursor = "crosshair";
}

// --- Capture clicks
map.on('click', e => {
  if (!drawing) return;

  points.push([e.latlng.lng, e.latlng.lat]);

  if (points.length > 1) {
    if (drawnLine) map.removeLayer(drawnLine);
    drawnLine = L.polyline(points.map(p => [p[1], p[0]])).addTo(map);
  }
});

// --- Projection definitions

const wgs84 = 'EPSG:4326';

// Web Mercator
const mercator = 'EPSG:3857';

// UTM Zone 10N
proj4.defs("EPSG:26910",
  "+proj=utm +zone=10 +datum=NAD83 +units=m +no_defs"
);

// CA Albers (equal-area)
proj4.defs("EPSG:3310",
  "+proj=aea +lat_1=34 +lat_2=40.5 +lat_0=0 +lon_0=-120 " +
  "+x_0=0 +y_0=-4000000 +datum=NAD83 +units=m +no_defs"
);

// CA Statewide (your LCC)
proj4.defs("CA_LCC",
  "+proj=lcc +lat_1=34 +lat_2=40.5 +lat_0=36 +lon_0=-120 " +
  "+x_0=0 +y_0=0 +datum=NAD83 +units=m +no_defs"
);

// State Plane zones (simplified)
function getStatePlaneZone(lat) {
  if (lat > 40) return { name: "Zone 1", cm: -122 };
  if (lat > 37.5) return { name: "Zone 2", cm: -122 };
  if (lat > 35.5) return { name: "Zone 3", cm: -120.5 };
  if (lat > 34) return { name: "Zone 4", cm: -119 };
  if (lat > 33) return { name: "Zone 5", cm: -118 };
  return { name: "Zone 6", cm: -117 };
}

// --- Helper functions

function projectCoords(coords, from, to) {
  return coords.map(c => proj4(from, to, c));
}

function lineLength(line) {
  return turf.length(line, { units: "kilometers" });
}

function bufferArea(line, distKm) {
  const buffer = turf.buffer(line, distKm, { units: "kilometers" });
  return turf.area(buffer) / 1e6;
}

function error(val, base) {
  return {
    delta: val - base,
    pct: ((val - base) / base) * 100
  };
}

// --- Analysis
function runAnalysis() {

  if (points.length < 2) {
    alert("Draw a line first.");
    return;
  }

  const line4326 = turf.lineString(points);
  
// ✅ Re-enable map interaction
map.dragging.enable();
map.doubleClickZoom.enable();
map.scrollWheelZoom.enable();
map.boxZoom.enable();
map.keyboard.enable();

drawing = false;
map.getContainer().style.cursor = "";

  // --- Determine best State Plane zone (based on centroid)
  const centroid = turf.centroid(line4326);
  const lat = centroid.geometry.coordinates[1];

  const spZone = getStatePlaneZone(lat);

  const spProj = `+proj=lcc +lat_1=34 +lat_2=36.5 +lat_0=33 +lon_0=${spZone.cm} +datum=NAD83 +units=m +no_defs`;

  // --- Project lines

  const lineMerc = turf.lineString(projectCoords(points, wgs84, mercator));
  const lineUTM = turf.lineString(projectCoords(points, wgs84, "EPSG:26910"));
  const lineAlbers = turf.lineString(projectCoords(points, wgs84, "EPSG:3310"));
  const lineCA = turf.lineString(projectCoords(points, wgs84, "CA_LCC"));
  const lineSP = turf.lineString(projectCoords(points, wgs84, spProj));

  // --- Lengths
  const lenSP = lineLength(lineSP);     // ✅ baseline
  const lenUTM = lineLength(lineUTM);
  const lenCA = lineLength(lineCA);
  const lenAlbers = lineLength(lineAlbers);
  const lenMerc = lineLength(lineMerc);

  // --- Areas via buffer (10 km)
  const areaAlbers = bufferArea(lineAlbers, 10);  // ✅ baseline
  const areaSP = bufferArea(lineSP, 10);
  const areaUTM = bufferArea(lineUTM, 10);
  const areaCA = bufferArea(lineCA, 10);
  const areaMerc = bufferArea(lineMerc, 10);

  // --- Errors
  const eUTM = error(lenUTM, lenSP);
  const eCA = error(lenCA, lenSP);
  const eAlb = error(lenAlbers, lenSP);
  const eMerc = error(lenMerc, lenSP);

  const aSP = error(areaSP, areaAlbers);
  const aUTM = error(areaUTM, areaAlbers);
  const aCA = error(areaCA, areaAlbers);
  const aMerc = error(areaMerc, areaAlbers);

  // --- Output
  document.getElementById("results").innerHTML = `

  <div class="result">
    <b>Distance (km)</b><br>
    ✅ State Plane (${spZone.name}): ${lenSP.toFixed(3)} (baseline)<br>
    UTM 26910: ${lenUTM.toFixed(3)} (${eUTM.pct.toFixed(2)}%)<br>
    CA Statewide: ${lenCA.toFixed(3)} (${eCA.pct.toFixed(2)}%)<br>
    Albers: ${lenAlbers.toFixed(3)} (${eAlb.pct.toFixed(2)}%)<br>
    Web Mercator: ${lenMerc.toFixed(3)} (${eMerc.pct.toFixed(2)}%)
  </div>

  <div class="result">
    <b>Buffer Area (km²)</b><br>
    ✅ Albers (Equal Area): ${areaAlbers.toFixed(1)} (baseline)<br>
    State Plane: ${areaSP.toFixed(1)} (${aSP.pct.toFixed(2)}%)<br>
    UTM 26910: ${areaUTM.toFixed(1)} (${aUTM.pct.toFixed(2)}%)<br>
    CA Statewide: ${areaCA.toFixed(1)} (${aCA.pct.toFixed(2)}%)<br>
    Web Mercator: ${areaMerc.toFixed(1)} (${aMerc.pct.toFixed(2)}%)
  </div>

  `;
}

</script>

</body>
</html>
